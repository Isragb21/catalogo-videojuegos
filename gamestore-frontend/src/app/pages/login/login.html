@if (!modo2FA) {
  <div class="login-page-wrapper">
    <div class="login-glass-card">
      
      <header>
        <h1 class="card-header">Acceso a<br><span class="gradient-text">GameStore</span></h1>
        <p class="institucional-notice">Exclusivo para comunidad UTEQ</p>
      </header>

      <form (ngSubmit)="procesarFormulario()">
        
        <div class="glass-input-group">
          <label>Correo Institucional:</label>
          <input type="email" [(ngModel)]="email" name="email" placeholder="ejemplo@uteq.edu.mx" required />
        </div>

        <div class="glass-input-group">
          <label>Contrasena:</label>
          <input type="password" [(ngModel)]="password" name="password" placeholder="••••••••" required />
        </div>

        @if (modoRegistro) {
          <div class="glass-input-group">
            <label>Nombre Completo:</label>
            <input type="text" [(ngModel)]="nombre" name="nombre" placeholder="Tu nombre real" required />
          </div>

          <div class="glass-input-group">
            <label>Telefono:</label>
            <input type="tel" [(ngModel)]="telefono" name="telefono" placeholder="442 123 4567" required />
          </div>

          <div class="glass-input-group">
            <label>Confirmar Contrasena:</label>
            <input type="password" [(ngModel)]="confirmPassword" name="confirmPassword" placeholder="••••••••" required />
          </div>
        }

        @if (mensajeError) {
          <div class="error-alert">
            {{ mensajeError }}
          </div>
        }

        <div class="form-actions">
          <button type="submit" class="btn-cta">
            {{ modoRegistro ? 'Registrarme' : 'Ingresar' }}
          </button>
          
          @if (!modoRegistro && fingerprintService.hasFingerprintRegistered()) {
            <button type="button" class="btn-cta" style="background: #333; margin-top: 10px;" (click)="loginConHuella()">
              👆 Ingresar con Huella
            </button>
          }

          <button type="button" class="btn-register-redirect" (click)="toggleModo()">
            {{ modoRegistro ? 'Volver al Login' : 'Crear Cuenta Nueva' }}
          </button>
        </div>

      </form>
    </div>
  </div>
}

@if (modo2FA) {
  <div class="overlay-2fa">
    <div class="login-glass-card" style="text-align: center; padding: 2rem; width: 100%; max-width: 450px; background: #1a1a1a; border: 1px solid #333;">
      
      <h2 style="color: white; margin-bottom: 1rem;">Proteccion en Dos Pasos</h2>
      <p style="color: #ccc; margin-bottom: 1.5rem;">{{ mensaje2FA }}</p>

      @if (qrCodeUrl) {
        <div style="margin: 0 auto 1.5rem auto; display: flex; justify-content: center; background: white; padding: 10px; border-radius: 8px; width: fit-content;">
          <qrcode [qrdata]="qrCodeUrl" [width]="200" [errorCorrectionLevel]="'M'"></qrcode>
        </div>
      }

      <div class="glass-input-group" style="margin-bottom: 1.5rem; text-align: left;">
        <label style="display: block; text-align: center; color: white;">Ingresa el codigo de 6 digitos:</label>
        <input 
          type="text" 
          [(ngModel)]="codigo2FA" 
          name="codigo2FA"
          placeholder="123456" 
          maxlength="6"
          style="text-align: center; letter-spacing: 5px; font-size: 1.2rem; margin-top: 10px; width: 100%;"
        >
      </div>

      <div class="form-actions">
        <button type="button" class="btn-cta" (click)="validarCodigo2FA()" style="width: 100%;">
          Verificar y Entrar
        </button>
      </div>

    </div>
  </div>
}
