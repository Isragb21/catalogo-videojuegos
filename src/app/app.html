<nav class="navbar">
  <div class="logo">🎮 GameStore</div>
  
  <ul class="menu-links">
    <li><a routerLink="/inicio" routerLinkActive="activo">Inicio</a></li>
    <li><a routerLink="/informacion" routerLinkActive="activo">📄 Información</a></li>
    <li><a routerLink="/catalogo" routerLinkActive="activo">Catálogo</a></li>

    @if (auth.usuario$ | async; as usuario) {
      <li><a routerLink="/perfil" routerLinkActive="activo">👤 Mi Perfil</a></li>
      <li><a routerLink="/admin" routerLinkActive="activo">🛠 Admin</a></li>
      
      <li class="usuario-info">
        <span>{{ usuario.email }}</span>
        <button (click)="cerrarSesion()" class="btn-logout">Cerrar Sesión</button>
      </li>

    } @else {
      <li><a routerLink="/login" class="btn-login">Iniciar Sesión</a></li>
    }
  </ul>
</nav>

<div class="contenido-pagina">
  <router-outlet></router-outlet>
</div>
