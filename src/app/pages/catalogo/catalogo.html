<div class="container main-content catalogo-container">
  <header class="section-header">
    <h1 class="page-title neon-text-green">Catálogo de <span class="gradient-text">Videojuegos</span></h1>
    <p class="section-subtitle">Explora nuestra colección y encuentra tu próximo desafío.</p>
  </header>

  <div class="search-bar glass-input-group">
    <input type="text" [(ngModel)]="busqueda" (ngModelChange)="filtrarJuegos()" placeholder="Buscar juego por título..." />
    <span class="search-icon">🔍</span>
  </div>

  <div class="grid-container games-grid">
    @for (juego of juegosFiltrados; track juego.id) {
      <div class="glass-card game-card">
        <img [src]="juego.imagen" [alt]="juego.titulo" class="card-image" />
        <div class="card-content">
          <h2 class="card-title">{{ juego.titulo }}</h2>
          <div class="card-metadata">
            <span class="platform-badge">{{ juego.plataforma }}</span>
            <span class="price-tag neon-text-green">${{ juego.precio }}</span>
          </div>
          <div class="card-actions">
            <button class="btn btn-outline-green btn-view-details">Ver detalles</button>
            <button 
              [id]="'btn-' + juego.id"
              (click)="agregarAlCarrito(juego)" 
              class="btn btn-primary btn-add-cart">
              🛒 AGREGAR
            </button>
          </div>
        </div>
      </div>
    }
  </div>
</div>
